services:
  postgres:
    image: postgres:17-alpine
    container_name: layu-auction-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: auction_dev
      POSTGRES_USER: auction
      POSTGRES_PASSWORD: auction
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
